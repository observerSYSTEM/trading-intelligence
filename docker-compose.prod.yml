services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-trading_intelligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - trading_intelligence

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - trading_intelligence

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: "no"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trading_intelligence}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading_intelligence}
      REDIS_URL: redis://redis:6379/0
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trading_intelligence

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trading_intelligence}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading_intelligence}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)); raise SystemExit(0 if data.get('ok') else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - trading_intelligence

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-trading_intelligence}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading_intelligence}
      REDIS_URL: redis://redis:6379/0
      ORACLE_SCHEDULER_IN_API: "false"
    command: ["python", "-m", "app.worker.oracle_worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - trading_intelligence

  frontend:
    build:
      context: ./trading-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL is required}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - trading_intelligence

volumes:
  postgres_data:
  redis_data:

networks:
  trading_intelligence:
    driver: bridge
