services:
  postgres:
    image: postgres:16
    container_name: tradeos_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradeos
    ports:
      - "5432:5432"
    volumes:
      - tradeos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: tradeos_redis
    ports:
      - "6379:6379"

volumes:
  tradeos_pgdata:
